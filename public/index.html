<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Shop Agent Prototype</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="atmosphere" aria-hidden="true">
      <span class="grain"></span>
    </div>
    <main class="app">
      <section class="store" aria-label="Catalog">
        <header class="topbar">
          <div class="brand-block">
            <div class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 48 48" role="img">
                <path d="M24 5 39 13.5v17L24 43 9 30.5v-17L24 5Z"></path>
                <path d="M24 12v24M14.5 18.5 24 24l9.5-5.5"></path>
              </svg>
            </div>
            <div>
              <p class="eyebrow">AI private atelier</p>
              <h1>Maison AI Consult</h1>
            </div>
          </div>
          <div class="status" id="status">ready</div>
        </header>

        <section class="selected-product" id="selectedProduct" aria-live="polite"></section>
        <div class="grid" id="productGrid"></div>
        <nav class="pagination" id="pagination" aria-label="Catalog pages"></nav>
      </section>

      <aside class="assistant" aria-label="AI assistant">
        <div class="assistant-head">
          <div>
            <p class="eyebrow">site chat</p>
            <h2>Not sure what to choose?</h2>
          </div>
          <span id="engine">local</span>
        </div>

        <div class="messages" id="messages">
          <div class="message bot">Hey there! Let's get you started with some options. What do you have in mind?</div>
          <div class="quick-replies">
            <button type="button" data-message="Show me light shirts for summer"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9L12 3Z"></path></svg><span>Summer shirts</span></button>
            <button type="button" data-message="I need a simple black evening dress"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9L12 3Z"></path></svg><span>Black dress</span></button>
            <button type="button" data-message="Show me comfortable shoes for every day"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9L12 3Z"></path></svg><span>Daily shoes</span></button>
            <button type="button" data-message="I am looking for an ivory bridal gown"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9L12 3Z"></path></svg><span>Bridal gown</span></button>
          </div>
        </div>

        <form class="composer" id="chatForm">
          <input id="chatInput" name="message" autocomplete="off" placeholder="Example: I need sneakers for daily wear">
          <button type="submit">Find</button>
        </form>
      </aside>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
